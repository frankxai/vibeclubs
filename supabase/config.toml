# Supabase CLI config for local development.
# Run `supabase start` to spin up a local Postgres + Auth + Realtime stack.

project_id = "vibeclubs"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://vibeclubs.ai"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.external.google]
enabled = false
# Set client_id / secret via env for local dev:
#   SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID=...
#   SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET=...

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"
